name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 匯出 JSON 後改資料檔要重新發佈時，可手動觸發
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署；排隊中的舊 run 直接讓位給新的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 20：本機是 18，但 CI 用 20 才涵蓋得住之後升 ESLint 的路（見 CLAUDE.md）
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      # build 內含 vue-tsc 型別檢查
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
